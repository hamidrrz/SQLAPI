<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQLAPI - Settings</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/settings.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12">
                <h1 class="mb-4">SQLAPI Settings</h1>
                
                <!-- Login Form -->
                <div id="loginSection" class="card mb-4">
                    <div class="card-header">
                        <h5>Login</h5>
                    </div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Login</button>
                        </form>
                        <div id="loginError" class="alert alert-danger mt-3 d-none"></div>
                    </div>
                </div>
                
                <!-- Settings Section (Hidden until login) -->
                <div id="settingsSection" class="d-none">
                    <!-- Database Configuration -->
                    <div class="card mb-4">
                        <div class="card-header">
                            <h5>Database Configuration</h5>
                        </div>
                        <div class="card-body">
                            <form id="databaseConfigForm">
                                <div class="mb-3">
                                    <label for="server" class="form-label">Server</label>
                                    <input type="text" class="form-control" id="server" required>
                                </div>
                                <div class="mb-3">
                                    <label for="database" class="form-label">Database</label>
                                    <input type="text" class="form-control" id="database" required>
                                </div>
                                <div class="mb-3">
                                    <label for="dbUsername" class="form-label">Username</label>
                                    <input type="text" class="form-control" id="dbUsername" required>
                                </div>
                                <div class="mb-3">
                                    <label for="dbPassword" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="dbPassword" required>
                                </div>
                                <button type="submit" class="btn btn-primary">Save Database Settings</button>
                                <button type="button" class="btn btn-secondary" id="testConnectionBtn">Test Connection</button>
                            </form>
                            <div id="dbConfigMessage" class="alert mt-3 d-none"></div>
                        </div>
                    </div>
                    
                    <!-- Settings Authentication -->
                    <div class="card mb-4">
                        <div class="card-header">
                            <h5>Settings Authentication</h5>
                        </div>
                        <div class="card-body">
                            <form id="settingsAuthForm">
                                <div class="mb-3">
                                    <label for="settingsUsername" class="form-label">Username</label>
                                    <input type="text" class="form-control" id="settingsUsername" required>
                                </div>
                                <div class="mb-3">
                                    <label for="settingsPassword" class="form-label">New Password</label>
                                    <input type="password" class="form-control" id="settingsPassword" required>
                                </div>
                                <div class="mb-3">
                                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                                    <input type="password" class="form-control" id="confirmPassword" required>
                                </div>
                                <button type="submit" class="btn btn-primary">Update Settings Password</button>
                            </form>
                            <div id="authMessage" class="alert mt-3 d-none"></div>
                        </div>
                    </div>
                    
                    <!-- Query Management -->
                    <div class="card mb-4">
                        <div class="card-header">
                            <h5>Query Management</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label for="querySlotSelect" class="form-label">Select Query Slot</label>
                                <select class="form-select" id="querySlotSelect">
                                    <option value="0">Slot 0</option>
                                    <option value="1">Slot 1</option>
                                    <option value="2">Slot 2</option>
                                    <option value="3">Slot 3</option>
                                    <option value="4">Slot 4</option>
                                    <option value="5">Slot 5</option>
                                    <option value="6">Slot 6</option>
                                    <option value="7">Slot 7</option>
                                    <option value="8">Slot 8</option>
                                    <option value="9">Slot 9</option>
                                </select>
                            </div>
                            <form id="querySlotForm">
                                <div class="mb-3">
                                    <label for="queryName" class="form-label">Query Name</label>
                                    <input type="text" class="form-control" id="queryName" required>
                                </div>
                                <div class="mb-3">
                                    <label for="querySql" class="form-label">SQL Query</label>
                                    <textarea class="form-control" id="querySql" rows="5" required></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary">Save Query</button>
                            </form>
                            <div id="queryMessage" class="alert mt-3 d-none"></div>
                        </div>
                    </div>
                    
                    <!-- Query Slots List -->
                    <div class="card mb-4">
                        <div class="card-header">
                            <h5>Configured Query Slots</h5>
                        </div>
                        <div class="card-body">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>SQL</th>
                                    </tr>
                                </thead>
                                <tbody id="querySlotsTableBody">
                                    <!-- Query slots will be populated here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
